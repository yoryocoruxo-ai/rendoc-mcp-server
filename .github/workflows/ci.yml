name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify shebang in bin
        run: head -1 dist/index.js | grep -q '^#!/usr/bin/env node'

      - name: Smoke test MCP handshake
        env:
          RENDOC_API_KEY: smoke-test-key
        run: |
          {
            printf '%s\n' \
              '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.0.1"}}}' \
              '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' \
              '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'
            sleep 1
          } | node dist/index.js | tee /tmp/out.log
          grep -q '"protocolVersion":"2024-11-05"' /tmp/out.log
          grep -q '"generate_document"' /tmp/out.log
          echo "MCP handshake and tools/list verified"
